<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Statystyki BDO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Statystyki wg Wytwórców</h1>
        <a href="/" class="btn btn-secondary">Powrót</a>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <form method="POST" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Data od:</label>
                    <input type="date" name="date_from" class="form-control" value="{{ date_from }}">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">Data do:</label>
                    <input type="date" name="date_to" class="form-control" value="{{ date_to }}">
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Filtruj i przelicz</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Nazwa Oczyszczalni (Wytwórca)</th>
                        <th class="text-center">Liczba kursów</th>
                        <th class="text-end">Suma [tony]</th>
                    </tr>
                </thead>
                <tbody>
                    {% for sender, data in stats.items() %}
                    <tr>
                        <td>{{ sender }}</td>
                        <td class="text-center">{{ data.count }}</td>
                        <td class="text-end fw-bold">{{ "%.4f"|format(data.total_mass) }} t</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</div>
</body>
</html>
